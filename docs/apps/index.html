<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TabForge Apps</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181d20;
      --panel-2: #20262a;
      --line: #344047;
      --text: #edf4f2;
      --muted: #9dacaa;
      --green: #5ee08b;
      --yellow: #e9c95d;
      --cyan: #69d2e7;
      --red: #ff7a6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      padding: 18px 0 22px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 64px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 780px;
      font-size: 16px;
      line-height: 1.5;
    }

    .status {
      display: grid;
      gap: 8px;
      min-width: 250px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
    }

    .status span {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .status strong {
      color: var(--text);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      color: var(--text);
      text-decoration: none;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .button.primary {
      color: #07120c;
      background: var(--green);
      border-color: var(--green);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .app {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .icon {
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      border-radius: 8px;
      background: var(--cyan);
      color: #071014;
      font-weight: 800;
      font-size: 18px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .tag.good {
      color: var(--green);
      border-color: rgba(94, 224, 139, 0.45);
    }

    code {
      color: var(--yellow);
      overflow-wrap: anywhere;
    }

    .package {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0d0e;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      header,
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      main {
        width: min(100vw - 20px, 1180px);
        padding-top: 12px;
      }

      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section>
        <h1>TabForge Apps</h1>
        <p class="subtitle">GitHub Pages app library for TabForge mini apps. The Tab5 Store pulls this catalog, compares each app against the SD-installed version, and updates apps individually.</p>
      </section>
      <aside class="status" aria-label="Catalog status">
        <span>Channel <strong id="channel">stable</strong></span>
        <span>Apps <strong id="count">0</strong></span>
        <span>Updated <strong id="updated">loading</strong></span>
      </aside>
    </header>

    <nav class="toolbar" aria-label="Library links">
      <a class="button primary" href="../app-store.json">Catalog JSON</a>
      <a class="button" href="../">TabForge Home</a>
      <a class="button" href="../manifest.json">Firmware Manifest</a>
    </nav>

    <section id="apps" class="grid" aria-label="Available apps"></section>
  </main>

  <script>
    const appGrid = document.getElementById("apps");

    function appCard(app) {
      const article = document.createElement("article");
      article.className = "app";

      const icon = document.createElement("div");
      icon.className = "icon";
      icon.textContent = app.icon || "APP";
      article.appendChild(icon);

      const body = document.createElement("div");
      body.innerHTML = `
        <h2></h2>
        <p></p>
        <div class="meta"></div>
        <div class="package"></div>
      `;
      body.querySelector("h2").textContent = app.name || app.id;
      body.querySelector("p").textContent = app.summary || "TabForge mini app.";

      const meta = body.querySelector(".meta");
      [
        `v${app.version || "0.0.0"}`,
        app.category || "General",
        app.status || "stable",
        `${app.actionCount || 0} actions`,
        `min firmware ${app.minFirmware || "-"}`
      ].forEach((value, index) => {
        const tag = document.createElement("span");
        tag.className = index === 2 ? "tag good" : "tag";
        tag.textContent = value;
        meta.appendChild(tag);
      });

      const pkg = body.querySelector(".package");
      pkg.innerHTML = `
        <div>Package: <a href="${app.packageUrl}">${app.id}.json</a></div>
        <div>Size: <code>${app.size}</code> bytes</div>
        <div>SHA256: <code>${app.sha256}</code></div>
        <div>Install path: <code>${app.installedPath || ""}</code></div>
      `;
      article.appendChild(body);
      return article;
    }

    async function loadCatalog() {
      try {
        const res = await fetch("../app-store.json", { cache: "no-store" });
        if (!res.ok) throw new Error("catalog fetch failed");
        const catalog = await res.json();
        const apps = Array.isArray(catalog.apps) ? catalog.apps : [];
        document.getElementById("channel").textContent = catalog.channel || "stable";
        document.getElementById("count").textContent = String(apps.length);
        document.getElementById("updated").textContent = catalog.updated || "unknown";
        appGrid.replaceChildren(...apps.map(appCard));
      } catch (err) {
        appGrid.textContent = String(err);
      }
    }

    loadCatalog();
  </script>
</body>
</html>
